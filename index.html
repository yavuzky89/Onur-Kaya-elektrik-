<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowStore Architecture | Enterprise Frontend</title>
    <!-- Tailwind CSS for Scalable Utility Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Enterprise Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
        }
        /* Custom Scrollbar for Premium Feel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- APP HEADER -->
    <header class="sticky top-0 z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-slate-800/60 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="#" class="text-2xl font-extrabold tracking-tight text-white flex items-center gap-2">
                <i class="fa-solid fa-cube text-amber-400"></i>GLOW<span class="text-amber-400 font-light">CORE</span>
            </a>
            
            <!-- Global Search Architecture -->
            <div class="hidden md:flex items-center relative w-96">
                <input type="text" id="global-search" placeholder="Ekosistemde ara (Örn: Klavye, Telefon...)" 
                       class="w-full bg-slate-900/60 border border-slate-800 rounded-full py-2 pl-10 pr-4 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-amber-400/50 focus:ring-1 focus:ring-amber-400/50 transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 text-slate-500 text-xs"></i>
            </div>

            <!-- Action Bar -->
            <div class="flex items-center gap-4">
                <button onclick="App.Store.dispatch('TOGGLE_FAVORITES')" class="relative p-2.5 text-slate-400 hover:text-rose-400 transition-colors">
                    <i class="fa-solid fa-heart text-xl"></i>
                    <span id="fav-badge" class="absolute top-1 right-1 bg-rose-500 text-white text-[10px] font-bold w-4 h-4 rounded-full hidden flex items-center justify-center">0</span>
                </button>
                <button onclick="App.UI.toggleCart(true)" class="relative p-2.5 bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-200 rounded-xl transition-all">
                    <i class="fa-solid fa-bag-shopping text-lg"></i>
                    <span id="cart-badge" class="absolute -top-1.5 -right-1.5 bg-amber-400 text-slate-950 text-xs font-black px-1.5 min-w-[20px] h-5 rounded-full flex items-center justify-center transition-transform">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- CORE INTERFACE LAYOUT -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- SIDEBAR: ADVANCED SEARCH & FILTERS -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-6">
            <!-- Category Filter Widget -->
            <div class="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Kategoriler</h3>
                <div class="flex flex-col gap-1" id="category-filters">
                    <!-- Dynamic Generation -->
                </div>
            </div>

            <!-- Price Sorting Widget -->
            <div class="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-5">
                <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Sıralama</h3>
                <select id="price-sort" onchange="App.Store.dispatch('SET_SORT', this.value)" 
                        class="w-full bg-slate-950 border border-slate-800 text-slate-300 rounded-xl p-2.5 text-sm focus:outline-none focus:border-amber-400">
                    <option value="default">Önerilen</option>
                    <option value="price-asc">Fiyat: Düşükten Yükseğe</option>
                    <option value="price-desc">Fiyat: Yüksekten Düşüğe</option>
                </select>
            </div>
        </aside>

        <!-- PRODUCT CATALOG GRID -->
        <section class="flex-grow">
            <div class="flex items-center justify-between mb-6">
                <p id="catalog-count" class="text-sm text-slate-400 font-medium">Yükleniyor...</p>
            </div>
            <div id="products-catalog" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Core Engine Will Inject Component Cards Here -->
            </div>
        </section>
    </main>

    <!-- SLIDE-OVER DRAWER: CORE CART MOTOR -->
    <div id="cart-drawer-overlay" onclick="App.UI.toggleCart(false)" class="fixed inset-0 bg-slate-950/60 backdrop-blur-sm z-50 opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="cart-drawer" class="fixed right-0 top-0 bottom-0 w-full max-w-md bg-[#0d1321] border-l border-slate-800/80 z-50 translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-slate-800/60 flex items-center justify-between">
            <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fa-solid fa-basket-shopping text-amber-400"></i> Sepetiniz</h3>
            <button onclick="App.UI.toggleCart(false)" class="p-2 text-slate-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        
        <!-- Cart Items Stream -->
        <div id="cart-items-stream" class="flex-grow overflow-y-auto p-6 flex flex-col gap-4">
            <!-- Dynamic Inject -->
        </div>

        <!-- Checkout Financial Summary -->
        <div class="p-6 bg-slate-900/40 border-t border-slate-800/60 flex flex-col gap-4">
            <div class="flex justify-between text-sm text-slate-400">
                <span>Ara Toplam</span>
                <span id="summary-subtotal">0.00 TL</span>
            </div>
            <div class="flex justify-between text-sm text-slate-400">
                <span>KDV (%20)</span>
                <span id="summary-tax">0.00 TL</span>
            </div>
            <div class="flex justify-between text-lg font-bold text-white pt-2 border-t border-dashed border-slate-800">
                <span>Genel Toplam</span>
                <span id="summary-total" class="text-amber-400">0.00 TL</span>
            </div>
            <button onclick="App.Services.Checkout.execute()" class="w-full bg-amber-400 hover:bg-amber-500 text-slate-950 font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all mt-2 shadow-lg shadow-amber-400/10">
                <i class="fa-solid fa-credit-card"></i> Güvenli Siparişi Tamamla (WhatsApp)
            </button>
        </div>
    </div>

    <!-- DYNAMIC CORE ENGINE SHIELD -->
    <script>
        /**
         * GLOBAL APPLICATION SCOPE
         * Mimarinin kalbi: State Machine, UI Controller ve Veri Modeli ayrımı.
         */
        const App = {
            // Enterprise Mock Data Model
            Data: {
                products: [
                    { id: "p-101", name: 'ProBook 14" Sleek X', category: "Computers", price: 24999.00, stock: 5, icon: 'fa-laptop', desc: 'Apple M serisi muadili, yüksek performanslı alüminyum kasa iş istasyonu.' },
                    { id: "p-102", name: 'Zeta Phone 13 Ultra', category: "Phones", price: 19450.00, stock: 3, icon: 'fa-mobile-screen-button', desc: '144Hz AMOLED ekran, 200MP Leica lens entegrasyonu.' },
                    { id: "p-103", name: 'Glow Watch Alpha Pro', category: "Accessories", price: 4200.00, stock: 12, icon: 'fa-clock', desc: 'Safir cam ekran, 14 gün batarya ömrü sunan akıllı saat.' },
                    { id: "p-104", name: 'Neon Mechanical Grid v2', category: "Peripherals", price: 1850.00, stock: 8, icon: 'fa-keyboard', desc: 'Hot-swappable lineer switchler ile donatılmış %75 mekanik klavye.' },
                    { id: "p-105", name: 'Quantum Audio Pods', category: "Accessories", price: 2950.00, stock: 0, icon: 'fa-headphones', desc: 'Aktif Gürültü Engelleme (ANC) destekli hi-res kablosuz kulaklık.' },
                    { id: "p-106", name: 'Streamer Desk Mic Pro', category: "Peripherals", price: 3400.00, stock: 4, icon: 'fa-microphone', desc: 'Stüdyo kalitesinde kardioid condenser yayıncı mikrofonu.' }
                ],
                categories: ["All", "Computers", "Phones", "Accessories", "Peripherals"]
            },

            // REDUX-LIKE CENTRAL STATE SYSTEM
            Store: {
                state: {
                    cart: [],
                    favorites: [],
                    activeCategory: "All",
                    searchQuery: "",
                    sortBy: "default"
                },
                listeners: [],
                
                subscribe(listener) {
                    this.listeners.push(listener);
                },
                
                dispatch(action, payload) {
                    console.log(`%c[Dispatch]: ${action}`, 'color: #fbbf24; font-weight: bold;', payload);
                    
                    switch(action) {
                        case 'ADD_TO_CART':
                            const prod = App.Data.products.find(p => p.id === payload);
                            if (!prod || prod.stock === 0) return;
                            const cartItem = this.state.cart.find(item => item.id === payload);
                            if (cartItem) {
                                if (cartItem.qty < prod.stock) cartItem.qty++;
                            } else {
                                this.state.cart.push({ ...prod, qty: 1 });
                            }
                            break;
                            
                        case 'UPDATE_CART_QTY':
                            const item = this.state.cart.find(i => i.id === payload.id);
                            if (item) {
                                item.qty += payload.amount;
                                if (item.qty <= 0) {
                                    this.state.cart = this.state.cart.filter(i => i.id !== payload.id);
                                }
                            }
                            break;
                            
                        case 'TOGGLE_FAVORITE':
                            if (this.state.favorites.includes(payload)) {
                                this.state.favorites = this.state.favorites.filter(id => id !== payload);
                            } else {
                                this.state.favorites.push(payload);
                            }
                            break;
                            
                        case 'SET_CATEGORY':
                            this.state.activeCategory = payload;
                            break;
                            
                        case 'SET_SEARCH':
                            this.state.searchQuery = payload.toLowerCase();
                            break;
                            
                        case 'SET_SORT':
                            this.state.sortBy = payload;
                            break;
                    }
                    
                    // Trigger Virtual-DOM Synchronizer
                    this.listeners.forEach(listener => listener(this.state));
                }
            },

            // UI COMPONENT RENDERENGINE
            UI: {
                init() {
                    // DOM Event Bindings
                    document.getElementById('global-search').addEventListener('input', (e) => {
                        App.Store.dispatch('SET_SEARCH', e.target.value);
                    });
                    
                    this.renderCategories();
                    this.sync(App.Store.state);
                },

                toggleCart(open) {
                    const drawer = document.getElementById('cart-drawer');
                    const overlay = document.getElementById('cart-drawer-overlay');
                    if (open) {
                        drawer.classList.remove('translate-x-full');
                        overlay.classList.remove('opacity-0', 'pointer-events-none');
                    } else {
                        drawer.classList.add('translate-x-full');
                        overlay.classList.add('opacity-0', 'pointer-events-none');
                    }
                },

                renderCategories() {
                    const container = document.getElementById('category-filters');
                    container.innerHTML = App.Data.categories.map(cat => `
                        <button onclick="App.Store.dispatch('SET_CATEGORY', '${cat}')" id="cat-btn-${cat}"
                                class="w-full text-left px-3 py-2 rounded-xl text-sm font-medium transition-all flex items-center justify-between text-slate-400 hover:bg-slate-900 hover:text-white">
                            <span>${cat === 'All' ? 'Tüm Ürünler' : cat}</span>
                        </button>
                    `).join('');
                },

                // THE CORE SYNCHRONIZER (Reactive Rendering Pipeline)
                sync(state) {
                    // Update Badges
                    const totalItems = state.cart.reduce((acc, item) => acc + item.qty, 0);
                    const cartBadge = document.getElementById('cart-badge');
                    cartBadge.innerText = totalItems;
                    cartBadge.style.transform = 'scale(1.2)';
                    setTimeout(() => cartBadge.style.transform = 'scale(1)', 150);

                    // Sync Categories UI state
                    App.Data.categories.forEach(cat => {
                        const btn = document.getElementById(`cat-btn-${cat}`);
                        if(!btn) return;
                        if(state.activeCategory === cat) {
                            btn.className = "w-full text-left px-3 py-2 rounded-xl text-sm font-bold bg-amber-400 text-slate-950 transition-all";
                        } else {
                            btn.className = "w-full text-left px-3 py-2 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-900 hover:text-white transition-all";
                        }
                    });

                    // Filter & Sort Pipeline
                    let filteredProducts = App.Data.products.filter(p => {
                        const matchesCategory = state.activeCategory === "All" || p.category === state.activeCategory;
                        const matchesSearch = p.name.toLowerCase().includes(state.searchQuery) || p.desc.toLowerCase().includes(state.searchQuery);
                        return matchesCategory && matchesSearch;
                    });

                    if (state.sortBy === "price-asc") filteredProducts.sort((a,b) => a.price - b.price);
                    if (state.sortBy === "price-desc") filteredProducts.sort((a,b) => b.price - a.price);

                    document.getElementById('catalog-count').innerText = `${filteredProducts.length} ürün listeleniyor`;

                    // Render Product Cards
                    const catalogContainer = document.getElementById('products-catalog');
                    if(filteredProducts.length === 0) {
                        catalogContainer.innerHTML = `
                            <div class="col-span-full py-12 text-center text-slate-500">
                                <i class="fa-solid fa-box-open text-4xl mb-3 block"></i> Aradığınız kriterde ürün bulunamadı.
                            </div>`;
                    } else {
                        catalogContainer.innerHTML = filteredProducts.map(p => {
                            const isFav = state.favorites.includes(p.id);
                            const outOfStock = p.stock === 0;
                            return `
                                <div class="bg-slate-900/40 border border-slate-800/60 rounded-2xl p-5 flex flex-col justify-between group hover:border-slate-700/80 transition-all relative">
                                    <div>
                                        <div class="h-44 rounded-xl bg-slate-950 flex items-center justify-center text-4xl relative text-slate-500 group-hover:text-amber-400 transition-colors">
                                            <i class="fa-solid ${p.icon}"></i>
                                            <button onclick="App.Store.dispatch('TOGGLE_FAVORITE', '${p.id}')" 
                                                    class="absolute top-3 right-3 w-8 h-8 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center text-sm transition-transform active:scale-95 ${isFav ? 'text-rose-500 border-rose-500/20 bg-rose-500/5' : 'text-slate-400 hover:text-white'}">
                                                <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                                            </button>
                                            ${outOfStock ? '<span class="absolute inset-0 bg-slate-950/80 rounded-xl flex items-center justify-center text-xs font-bold text-slate-400 tracking-wider uppercase">Stok Tükendi</span>' : ''}
                                        </div>
                                        <div class="mt-4">
                                            <span class="text-[10px] font-bold text-amber-400/80 bg-amber-400/5 border border-amber-400/10 px-2 py-0.5 rounded-md uppercase">${p.category}</span>
                                            <h4 class="text-base font-bold text-white mt-2 group-hover:text-amber-300 transition-colors">${p.name}</h4>
                                            <p class="text-xs text-slate-400 mt-1 line-clamp-2">${p.desc}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between mt-5 pt-4 border-t border-slate-800/40">
                                        <span class="text-lg font-black text-white">${p.price.toLocaleString('tr-TR', {minimumFractionDigits:2})} TL</span>
                                        <button onclick="App.Store.dispatch('ADD_TO_CART', '${p.id}')" ${outOfStock ? 'disabled' : ''}
                                                class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700 text-white flex items-center justify-center hover:bg-amber-400 hover:text-slate-950 disabled:opacity-30 disabled:pointer-events-none transition-all active:scale-95">
                                            <i class="fa-solid fa-plus text-sm"></i>
                                        </button>
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }

                    // Render Cart Stream Drawer
                    const cartContainer = document.getElementById('cart-items-stream');
                    if(state.cart.length === 0) {
                        cartContainer.innerHTML = `
                            <div class="h-full flex flex-col items-center justify-center text-slate-500 text-sm py-12">
                                <i class="fa-solid fa-basket-shopping text-3xl mb-2 text-slate-600"></i>Sepetiniz boş.
                            </div>`;
                    } else {
                        cartContainer.innerHTML = state.cart.map(item => `
                            <div class="bg-slate-900 border border-slate-800/80 p-4 rounded-xl flex items-center gap-4">
                                <div class="w-12 h-12 bg-slate-950 rounded-lg flex items-center justify-center text-xl text-amber-400/80"><i class="fa-solid ${item.icon}"></i></div>
                                <div class="flex-grow">
                                    <h5 class="text-xs font-bold text-white line-clamp-1">${item.name}</h5>
                                    <span class="text-xs font-semibold text-amber-400 block mt-0.5">${(item.price * item.qty).toLocaleString('tr-TR', {minimumFractionDigits:2})} TL</span>
                                    <div class="flex items-center gap-2 mt-2">
                                        <button onclick="App.Store.dispatch('UPDATE_CART_QTY', {id:'${item.id}', amount:-1})" class="w-5 h-5 bg-slate-950 rounded border border-slate-800 text-slate-400 text-xs font-bold flex items-center justify-center hover:bg-slate-800">-</button>
                                        <span class="text-xs font-bold text-slate-200 min-w-[12px] text-center">${item.qty}</span>
                                        <button onclick="App.Store.dispatch('UPDATE_CART_QTY', {id:'${item.id}', amount:1})" class="w-5 h-5 bg-slate-950 rounded border border-slate-800 text-slate-400 text-xs font-bold flex items-center justify-center hover:bg-slate-800">+</button>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    }

                    // Financial Calculations
                    const subtotal = state.cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
                    const tax = subtotal * 0.20;
                    const total = subtotal + tax;

                    document.getElementById('summary-subtotal').innerText = subtotal.toLocaleString('tr-TR', {minimumFractionDigits:2}) + " TL";
                    document.getElementById('summary-tax').innerText = tax.toLocaleString('tr-TR', {minimumFractionDigits:2}) + " TL";
                    document.getElementById('summary-total').innerText = total.toLocaleString('tr-TR', {minimumFractionDigits:2}) + " TL";
                }
            },

            // INFRASTRUCTURE SERVICES OUTBOUND ENTITIES
            Services: {
                Checkout: {
                    execute() {
                        const state = App.Store.state;
                        if(state.cart.length === 0) {
                            alert("Bileşen Hatası: Sepetiniz boşken ödeme katmanına geçilemez.");
                            return;
                        }

                        let phone = "905000000000"; // Production Gateway Number
                        let manifest = `⚡ *GLOWCORE ENTERPRISE ORDER MANIFEST*\n`;
                        manifest += `==================================\n\n`;
                        
                        let subtotal = 0;
                        state.cart.forEach((item, index) => {
                            let itemTotal = item.price * item.qty;
                            subtotal += itemTotal;
                            manifest += `📦 *[${index+1}] ${item.name}*\n`;
                            manifest += `   Miktar: ${item.qty} adet\n`;
                            manifest += `   Birim Fiyat: ${item.price.toLocaleString('tr-TR')} TL\n`;
                            manifest += `   Kalem Toplamı: ${itemTotal.toLocaleString('tr-TR')} TL\n\n`;
                        });

                        const tax = subtotal * 0.20;
                        const finalPrice = subtotal + tax;

                        manifest += `==================================\n`;
                        manifest += `*Ara Toplam:* ${subtotal.toLocaleString('tr-TR')} TL\n`;
                        manifest += `*KDV (%20):* ${tax.toLocaleString('tr-TR')} TL\n`;
                        manifest += `*GENEL TOPLAM:* ${finalPrice.toLocaleString('tr-TR')} TL\n\n`;
                        manifest += `🚀 _Sipariş veritabanına işlenmeye hazırdır. Onay bekliyor._`;

                        const endpoint = `https://wa.me/${phone}?text=${encodeURIComponent(manifest)}`;
                        window.open(endpoint, '_blank');
                    }
                }
            }
        };

        // APPLICATION BOOTSTRAP INITIALIZATION
        document.addEventListener('DOMContentLoaded', () => {
            // Bind Core Architecture Sync Engine to Redux-Like Store
            App.Store.subscribe(App.UI.sync.bind(App.UI));
            // Initialize Systems
            App.UI.init();
        });
    </script>
</body>
</html>
